<!DOCTYPE html>
<script>
window.componentPath = "/english-and-math.js";
window.wrapperComponentPath = "/src/page-wrapper.js";
window.dataPath = "/english-and-math.json";
</script>
<html >
  <head>
  <title data-react-helmet="true">English and Math</title>
  <meta data-react-helmet="true" charset="utf-8"/>
  <link data-react-helmet="true" rel="stylesheet" href="/styles.css"/>
  
  
  </head>
  <body >
    <div id="toast-page-section"><header role="banner"><nav role="navigation" class="max-w-2xl mx-auto px-5"><a href="/">Home</a><a href="/garden">Garden</a><a href="/project">Project</a><a href="/about">About</a></nav></header><main role="main"><div class="max-w-2xl mx-auto px-5"><p>I learn programming via English.</p></div></main></div>
    <script type="module">
    /* @jsx jsx */

async function renderPage() {
  const promises = [
    import(window.componentPath),
    window.wrapperComponentPath
      ? import(window.wrapperComponentPath)
      : undefined,
    window.dataPath
      ? fetch(window.dataPath).then(response => {
          return response.json();
        })
      : {},
    import("/web_modules/preact.js")
  ];

  let pageWrapper = ({ children }) => h("div", null, children);
  const [
    PageModule,
    PageWrapperModule,
    pageData,
    { render, h }
  ] = await Promise.all(promises);
  const Page = PageModule.default;
  if(PageWrapperModule) {
    pageWrapper = PageWrapperModule.default
  }

  render(
    h(pageWrapper, pageData, h(Page, pageData)),
    document.getElementById("toast-page-section")
  );
}

renderPage();

</script>
  </body>
</html>
